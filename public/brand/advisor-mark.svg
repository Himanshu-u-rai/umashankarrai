<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Umashankar Rai advisor mark">
  <title>Umashankar Rai advisor mark</title>
  <!-- 5-ray sun above the shield -->
  <g fill="none" stroke="#FF8B1F" stroke-width="2" stroke-linecap="round">
    <line x1="32" y1="2"  x2="32" y2="8"/>
    <line x1="20" y1="5"  x2="22.5" y2="10"/>
    <line x1="44" y1="5"  x2="41.5" y2="10"/>
    <line x1="12" y1="11" x2="16"  y2="14"/>
    <line x1="52" y1="11" x2="48"  y2="14"/>
  </g>
  <circle cx="32" cy="13" r="4" fill="#FF8B1F"/>

  <!-- Rounded shield outline in LIC blue -->
  <path d="M32 17 L52 22 V36 C52 47 43 55 32 60 C21 55 12 47 12 36 V22 Z"
        fill="#002C77" stroke="#002C77" stroke-width="1.5" stroke-linejoin="round"/>

  <!-- Saffron arc inside the shield for warmth -->
  <path d="M18 30 Q32 22 46 30"
        fill="none" stroke="#FF8B1F" stroke-width="2.5" stroke-linecap="round"/>

  <!-- White checkmark across the shield -->
  <path d="M22 39 L29 46 L44 30"
        fill="none" stroke="#FFFFFF" stroke-width="4"
        stroke-linecap="round" stroke-linejoin="round"/>
</svg>
